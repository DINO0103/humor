<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/layout :: head('테트리스')}"></head>
<style>
    #tetris-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
        margin-bottom: 100px;
    }
    #game-board {
        border: 10px solid #f0f7ff;
        background-color: #121212;
        box-shadow: 0 10px 30px rgba(13, 110, 253, 0.2);
    }
    .game-info {
        margin-top: 20px;
        font-family: 'Playfair Display', serif;
        text-align: center;
    }
    .score-box {
        background: #f0f7ff;
        padding: 10px 30px;
        border-radius: 50px;
        border: 2px solid #0d6efd;
    }
    .score-value {
        font-size: 1.5rem;
        font-weight: bold;
        color: #0d6efd;
    }
    .controls-info {
        margin-top: 30px;
        padding: 15px 25px;
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 12px;
        font-size: 0.85rem;
        color: #6c757d;
    }
    .game-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: none; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 10; color: white;
    }
</style>
<body>

<div th:replace="~{common/layout :: gameHeader}"></div>

<div class="container content-container">
    <div id="tetris-container">
        <h1 class="nyt-logo mb-4" style="color: #0d6efd; font-size: 3.5rem;">TETRIS</h1>
        <div style="position: relative;">
            <canvas id="game-board" width="240" height="400"></canvas>
            <div id="game-over" class="game-overlay">
                <h2 class="mb-3" style="font-family: 'Playfair Display';">GAME OVER</h2>
                <div class="mb-4">SCORE: <span id="final-score">0</span></div>
                <button onclick="resetGame()" class="btn btn-primary px-4 fw-bold">RESTART</button>
            </div>
            <div id="start-msg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; pointer-events: none;">
                <h4 style="font-family: 'Playfair Display';">PRESS DOWN KEY</h4>
                <p class="small opacity-75">TO START GAME</p>
            </div>
        </div>
        
        <div class="game-info">
            <div class="score-box">
                <span class="me-3 small fw-bold text-muted">SCORE</span>
                <span id="score" class="score-value">0</span>
            </div>
        </div>

        <div class="controls-info text-center">
            <p class="mb-1"><strong>CONTROLS</strong></p>
            <p class="m-0">← → : Move | ↑ : Rotate | ↓ : Drop | Space : Hard Drop</p>
        </div>
        
        <div class="mt-4">
            <a th:href="@{/game}" class="btn btn-outline-primary btn-sm">BACK TO HUB</a>
        </div>
    </div>
</div>

<div th:replace="~{common/layout :: footer}"></div>

<script>
    const canvas = document.getElementById('game-board');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const finalScoreElement = document.getElementById('final-score');
    const gameOverElement = document.getElementById('game-over');
    const startMsg = document.getElementById('start-msg');

    context.scale(20, 20);

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 10;
            rowCount *= 2;
        }
        updateScore();
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    function createPiece(type) {
        if (type === 'T') {
            return [
                [0, 0, 0],
                [1, 1, 1],
                [0, 1, 0],
            ];
        } else if (type === 'O') {
            return [
                [2, 2],
                [2, 2],
            ];
        } else if (type === 'L') {
            return [
                [0, 3, 0],
                [0, 3, 0],
                [0, 3, 3],
            ];
        } else if (type === 'J') {
            return [
                [0, 4, 0],
                [0, 4, 0],
                [4, 4, 0],
            ];
        } else if (type === 'I') {
            return [
                [0, 5, 0, 0],
                [0, 5, 0, 0],
                [0, 5, 0, 0],
                [0, 5, 0, 0],
            ];
        } else if (type === 'S') {
            return [
                [0, 6, 6],
                [6, 6, 0],
                [0, 0, 0],
            ];
        } else if (type === 'Z') {
            return [
                [7, 7, 0],
                [0, 7, 7],
                [0, 0, 0],
            ];
        }
    }

    function draw() {
        context.fillStyle = '#121212';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    context.strokeStyle = '#121212';
                    context.lineWidth = 0.05;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    // 푸른색 계열 블록 색상 (Neon Blue Pallete)
    const colors = [
        null,
        '#0d6efd', // T
        '#0dcaf0', // O
        '#6610f2', // L
        '#0a58ca', // J
        '#cfe2ff', // I
        '#3d8bfd', // S
        '#9ec5fe', // Z
    ];

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) -
                       (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            gameOver();
        }
    }

    function gameOver() {
        isGameOver = true;
        finalScoreElement.innerText = player.score;
        gameOverElement.style.display = 'flex';
    }

    function resetGame() {
        gameOverElement.style.display = 'none';
        startMsg.style.display = 'block';
        isGameOver = false;
        gameStarted = false;
        arena.forEach(row => row.fill(0));
        player.score = 0;
        updateScore();
        playerReset();
        update();
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [
                    matrix[x][y],
                    matrix[y][x],
                ] = [
                    matrix[y][x],
                    matrix[x][y],
                ];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let isGameOver = false;
    let gameStarted = false;

    function update(time = 0) {
        if (isGameOver) return;
        const deltaTime = time - lastTime;
        lastTime = time;

        if (gameStarted) {
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
        }

        draw();
        requestAnimationFrame(update);
    }

    function updateScore() {
        scoreElement.innerText = player.score;
    }

    const arena = createMatrix(12, 20);

    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
    };

    document.addEventListener('keydown', event => {
        if (isGameOver) return;

        // 게임 조작 키(상, 하, 좌, 우, 스페이스) 입력 시 스크롤 방지
        if ([32, 37, 38, 39, 40].includes(event.keyCode)) {
            event.preventDefault();
        }

        if (!gameStarted && (event.keyCode === 40 || event.keyCode === 37 || event.keyCode === 39)) {
            gameStarted = true;
            startMsg.style.display = 'none';
        }

        if (event.keyCode === 37) {
            playerMove(-1);
        } else if (event.keyCode === 39) {
            playerMove(1);
        } else if (event.keyCode === 40) {
            playerDrop();
        } else if (event.keyCode === 38) {
            playerRotate(1);
        } else if (event.keyCode === 32) { // Space for hard drop
            if (!gameStarted) return;
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
    });

    playerReset();
    updateScore();
    update();
</script>
</body>
</html>
