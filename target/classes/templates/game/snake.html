<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/layout :: head('스네이크')}"></head>
<style>
    #snake-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
        margin-bottom: 100px;
    }
    #game-canvas {
        border: 10px solid #f0f7ff;
        background-color: #121212;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .score-box {
        background: #f0f7ff;
        padding: 10px 30px;
        border-radius: 50px;
        border: 2px solid #0d6efd;
        margin-top: 20px;
    }
    .score-value { font-size: 1.5rem; font-weight: bold; color: #121212; }
    
    .game-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 10; color: white;
        background: rgba(0,0,0,0.6);
    }
    #game-over { display: none; background: rgba(220, 53, 69, 0.8); }
</style>
<body>
<div th:replace="~{common/layout :: gameHeader}"></div>
<div class="container content-container">
    <div id="snake-container">
        <h1 class="nyt-logo mb-4" style="color: #0d6efd; font-size: 3.5rem;">SNAKE</h1>
        <div style="position: relative;">
            <canvas id="game-canvas" width="400" height="400"></canvas>
            
            <!-- Start Overlay -->
            <div id="start-overlay" class="game-overlay">
                <h4 style="font-family: 'Playfair Display';">READY?</h4>
                <p class="mb-4">Press any Arrow Key to Start</p>
                <div class="d-flex gap-2">
                    <div class="text-center small opacity-75">
                        <kbd class="bg-light text-dark">↑</kbd><br>
                        <kbd class="bg-light text-dark">←</kbd> <kbd class="bg-light text-dark">↓</kbd> <kbd class="bg-light text-dark">→</kbd>
                    </div>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over" class="game-overlay">
                <h2 class="mb-2" style="font-family: 'Playfair Display';">GAME OVER</h2>
                <div class="mb-4 h5">SCORE: <span id="final-score">0</span></div>
                <button onclick="resetGame()" class="btn btn-light px-4 fw-bold">TRY AGAIN</button>
            </div>
        </div>
        
        <div class="score-box">
            <span class="me-3 small fw-bold text-primary">SCORE</span>
            <span id="score" class="score-value">0</span>
        </div>
        <div class="mt-5">
            <a th:href="@{/game}" class="btn btn-outline-primary btn-sm">BACK TO HUB</a>
        </div>
    </div>
</div>
<div th:replace="~{common/layout :: footer}"></div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const finalScoreElement = document.getElementById('final-score');
    const gameOverElement = document.getElementById('game-over');
    const startOverlay = document.getElementById('start-overlay');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let score = 0;
    let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
    let food = {x: 5, y: 5};
    let dx = 0;
    let dy = 0;
    let isGameOver = false;
    let gameStarted = false;

    function draw() {
        if (isGameOver) return;

        ctx.fillStyle = '#121212';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Food
        ctx.fillStyle = '#ff4d4d';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff4d4d';
        ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
        ctx.shadowBlur = 0;

        // Draw Snake
        snake.forEach((part, index) => {
            ctx.fillStyle = index === 0 ? '#0dcaf0' : '#0d6efd';
            ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
        });

        if (gameStarted) {
            moveSnake();
            if (checkCollision()) {
                gameOver();
                return;
            }
        }

        setTimeout(draw, 100);
    }

    function moveSnake() {
        if (dx === 0 && dy === 0) return; // 움직임이 없으면 처리 안함

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreElement.innerText = score;
            createFood();
        } else {
            snake.pop();
        }
    }

    function checkCollision() {
        if (!gameStarted || (dx === 0 && dy === 0)) return false;

        const head = snake[0];
        // 벽 충돌
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
        // 자기 몸 충돌
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) return true;
        }
        return false;
    }

    function createFood() {
        food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };
        if (snake.some(part => part.x === food.x && part.y === food.y)) createFood();
    }

    function gameOver() {
        isGameOver = true;
        finalScoreElement.innerText = score;
        gameOverElement.style.display = 'flex';
    }

    function resetGame() {
        score = 0;
        scoreElement.innerText = score;
        snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        dx = 0; dy = 0;
        isGameOver = false;
        gameStarted = false;
        gameOverElement.style.display = 'none';
        startOverlay.style.display = 'flex';
        createFood();
        draw();
    }

    window.addEventListener('keydown', e => {
        if (isGameOver) return;
        
        let newDx = dx;
        let newDy = dy;

        if (e.key === 'ArrowUp' && dy !== 1) { newDx = 0; newDy = -1; }
        else if (e.key === 'ArrowDown' && dy !== -1) { newDx = 0; newDy = 1; }
        else if (e.key === 'ArrowLeft' && dx !== 1) { newDx = -1; newDy = 0; }
        else if (e.key === 'ArrowRight' && dx !== -1) { newDx = 1; newDy = 0; }
        else return; // 방향키가 아니면 무시

        if (!gameStarted) {
            gameStarted = true;
            startOverlay.style.display = 'none';
        }
        
        dx = newDx;
        dy = newDy;
        e.preventDefault(); // 스크롤 방지
    });

    createFood();
    draw();
</script>
</body>
</html>
