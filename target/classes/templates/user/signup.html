<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - The News Humor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .signup-container { max-width: 450px; margin: 80px auto; text-align: center; }
        .form-control { border-radius: 0; border: 1px solid #121212; padding: 10px; margin-bottom: 12px; }
        .btn-signup { width: 100%; background-color: #121212; color: white; border-radius: 0; padding: 12px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <div class="signup-container">
        <div class="nyt-logo" style="font-size: 2.5rem; margin-bottom: 10px;">The News Humor</div>
        <h2 class="mb-4" style="font-family: var(--nyt-font-serif); font-weight: 700;">Create Account</h2>
        <form th:action="@{/user/signup}" method="post">
            <input type="text" name="username" class="form-control" placeholder="ID (Username)" required>
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <input type="text" name="nickname" class="form-control" placeholder="Nickname" required>
            <button type="submit" class="btn btn-signup">Sign Up</button>
        </form>
        <div class="mt-3 small text-muted">
            Already have an account? <a th:href="@{/user/login}" class="text-dark fw-bold">Log In</a>
        </div>
    </div>
</div>
</body>
</html>
