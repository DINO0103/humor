<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - The News Humor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-title {
            font-family: var(--nyt-font-serif);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 0;
            border: 1px solid #121212;
            padding: 12px;
            margin-bottom: 15px;
        }
        .btn-login {
            width: 100%;
            background-color: #121212;
            color: white;
            border-radius: 0;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-login:hover {
            background-color: #333;
            color: white;
        }
        .footer-links {
            margin-top: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-container">
        <div class="nyt-logo" style="font-size: 2.5rem; margin-bottom: 10px;">The News Humor</div>
        <h1 class="login-title">Log in to your account</h1>
        
        <form th:action="@{/user/login}" method="post">
            <div th:if="${param.error}" class="alert alert-danger" style="border-radius: 0; font-size: 0.8rem;">
                Invalid username or password.
            </div>
            
            <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            
            <button type="submit" class="btn btn-login">Log In</button>
        </form>
        
        <div class="footer-links">
            <p>Don't have an account? <a th:href="@{/user/signup}" class="text-dark fw-bold">Create one</a></p>
            <a th:href="@{/}" class="text-muted text-decoration-none small">← Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
